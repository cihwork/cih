<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CIH - Operacional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #0097a7;
      --sidebar-background: #f8f9fa;
      --sidebar-nav-link-color--active: #0097a7;
      --sidebar-nav-link-border-color--active: #0097a7;
      --heading-color: #0097a7;
    }
    .sidebar .app-name {
      font-size: 1.3em;
      font-weight: bold;
      color: #0097a7;
      padding: 20px 15px 10px;
    }
    .cover-main {
      background: linear-gradient(135deg, #0097a7 0%, #00bcd4 100%) !important;
    }
    .markdown-section h1 {
      border-bottom: 2px solid #0097a7;
      padding-bottom: 10px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section table th {
      background-color: #0097a7;
      color: white;
    }
  </style>
</head>
<body>
  <div id="app">Carregando...</div>
  <script>
    window.$docsify = {
      name: 'CIH Operacional',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado encontrado',
        paths: 'auto'
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Próximo',
        crossChapter: true
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
